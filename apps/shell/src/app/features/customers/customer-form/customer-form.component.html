<div class="animate-fade-in max-w-2xl mx-auto">

  <!-- Header -->
  <div class="flex items-center gap-3 mb-6">
    <a routerLink="/customers" class="w-8 h-8 rounded-lg flex items-center justify-center border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div>
      <h1 class="page-title">{{ isEditMode() ? 'Edit Customer' : 'Add Customer' }}</h1>
      <p class="page-subtitle">{{ isEditMode() ? 'Update customer details' : 'Create a new customer record' }}</p>
    </div>
  </div>

  @if (facade.error()) {
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-4 text-sm">
      {{ facade.error() }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="ps-card p-6">

      <div class="form-grid">

        <!-- Name -->
        <div class="col-span-full">
          <label class="ps-label">Customer Name <span class="req">*</span></label>
          <input formControlName="name" type="text" class="ps-input" placeholder="e.g. Acme Corp" />
          @if (fieldError('name')) {
            <p class="text-red-500 text-xs mt-1">{{ fieldError('name') }}</p>
          }
        </div>

        <!-- Code -->
        <div>
          <label class="ps-label">Code</label>
          <input formControlName="code" type="text" class="ps-input" placeholder="e.g. CUST001" />
        </div>

        <!-- Site -->
        <div>
          <label class="ps-label">Site</label>
          <input formControlName="site" type="text" class="ps-input" placeholder="e.g. GMR, BIAL" />
        </div>

        <!-- Contact Number -->
        <div class="col-span-full">
          <label class="ps-label">Contact Number</label>
          <input formControlName="contactNumber" type="tel" class="ps-input" placeholder="Phone number" />
        </div>

        <!-- Active -->
        <div class="col-span-full">
          <label class="flex items-center gap-3 cursor-pointer select-none">
            <input formControlName="isActive" type="checkbox" class="w-4 h-4 rounded text-indigo-600 border-slate-300 focus:ring-indigo-500" />
            <span class="text-sm font-medium text-slate-700">Active</span>
          </label>
        </div>

      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3 mt-4">
      <button type="submit" class="ps-btn-primary" [disabled]="facade.isSaving()">
        {{ facade.isSaving() ? 'Saving...' : (isEditMode() ? 'Update Customer' : 'Create Customer') }}
      </button>
      <a routerLink="/customers" class="ps-btn-secondary">Cancel</a>
    </div>
  </form>

</div>
