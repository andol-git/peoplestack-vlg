<div class="ps-shell" [class.collapsed]="collapsed()">
  <aside class="ps-sidebar" [class.mobile-open]="mobileOpen()">
    <div class="ps-brand">
      <div class="ps-logo"><span>PS</span></div>
      @if(!collapsed()){ <span class="ps-brand-name">PeopleStack</span> }
    </div>
    <nav class="ps-nav">
      @for(item of nav; track item.route){
        <a class="ps-nav-item" [routerLink]="item.route" routerLinkActive="active" (click)="mobileOpen.set(false)">
          <span class="ps-nav-icon" [ngSwitch]="item.icon">
            <svg *ngSwitchCase="'grid'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <svg *ngSwitchCase="'users'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <svg *ngSwitchCase="'briefcase'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            <svg *ngSwitchCase="'link'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            <svg *ngSwitchCase="'clock'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <svg *ngSwitchCase="'bar-chart'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <svg *ngSwitchDefault width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          </span>
          @if(!collapsed()){ <span>{{ item.label }}</span> }
        </a>
      }
    </nav>
    <button class="ps-collapse d-none d-lg-flex" (click)="collapsed.update(v=>!v)">
      @if(collapsed()){ <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      } @else { <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> <span>Collapse</span> }
    </button>
  </aside>
  @if(mobileOpen()){ <div class="ps-overlay" (click)="mobileOpen.set(false)"></div> }
  <div class="ps-main">
    <header class="ps-topbar">
      <button class="ps-menu-btn d-flex d-lg-none" (click)="mobileOpen.update(v=>!v)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="ps-search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search employees, customers..." />
      </div>
      <div class="ps-topbar-right">
        <div class="ps-user">
          <div class="ps-avatar">AD</div>
          <div class="d-none d-md-block">
            <div class="ps-uname">Admin</div>
            <div class="ps-urole">Administrator</div>
          </div>
          <button class="ps-logout" (click)="logout()" title="Logout">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </header>
    <main class="ps-content"><router-outlet /></main>
  </div>
</div>
